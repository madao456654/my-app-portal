<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住宅ローン シミュレーター</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" crossorigin href="../assets/financeApp-DK_8tlCt.css">
</head>
<body>
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>Mortgage Simulator</h1>
            <p>金利変動を5段階まで設定できる高機能住宅ローン計算ツール。</p>
        </header>

        <main>
            <section class="card input-section">
                <h2>お借入条件</h2>
                <form id="simulator-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="principal">借入金額</label>
                            <div class="input-wrapper">
                                <input type="number" id="principal" value="3000" min="1" required>
                                <span class="unit">万円</span>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="years">返済期間</label>
                            <div class="input-wrapper">
                                <input type="number" id="years" value="35" min="1" max="50" required>
                                <span class="unit">年</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group method-group">
                        <label>返済方法</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="method" value="equal-total" checked>
                                <div class="radio-custom">
                                    <span class="radio-title">元利均等払い</span>
                                    <span class="radio-desc">毎月の返済額が一定になります</span>
                                </div>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="method" value="equal-principal">
                                <div class="radio-custom">
                                    <span class="radio-title">元金均等払い</span>
                                    <span class="radio-desc">毎月の元金返済額が一定になります</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="form-group rate-group">
                        <div class="rate-header">
                            <label>金利設定</label>
                            <button type="button" id="add-rate-btn" class="btn-small btn-secondary">+ 期間を追加</button>
                        </div>
                        <p class="helper-text">最大5段階まで金利変動を設定できます。（例: 1〜5年目 0.5%、6年目以降 1.0%）</p>
                        <div id="rate-list">
                            <!-- Rate Items inserted via JS -->
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">シミュレーションを実行する</button>
                </form>
            </section>

            <section class="card result-section" id="result-section" style="display: none;">
                <h2>シミュレーション結果</h2>
                
                <div class="summary-cards">
                    <div class="summary-card highlight" style="--delay: 0s;">
                        <h3>総支払額</h3>
                        <div class="summary-value" id="summary-total-amt">0<span>円</span></div>
                        <div class="summary-sub">借入金額: <span id="summary-principal"></span></div>
                    </div>
                    <div class="summary-card" style="--delay: 0.1s;">
                        <h3>支払利息の合計</h3>
                        <div class="summary-value" id="summary-total-interest">0<span>円</span></div>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table id="schedule-table">
                        <thead>
                            <tr>
                                <th>回数</th>
                                <th>返済額 (月)</th>
                                <th>元金分</th>
                                <th>利息分</th>
                                <th>残高</th>
                                <th>総支払額</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Schedule inserted via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
